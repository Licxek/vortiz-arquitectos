<!-- PROYECTOS — Vortiz Arquitectos -->

<section
  class="bg-white min-h-screen px-6 py-12 transition-all duration-500"
  [class.opacity-0]="!visible"
  [class.translate-y-4]="!visible"
  [class.opacity-100]="visible"
  [class.translate-y-0]="visible"
>
  <div class="max-w-4xl mx-auto">

    <!-- Encabezado -->
    <div class="mb-8">
      <span class="block text-xs font-bold tracking-widest uppercase text-slate-400 mb-2">
        Portafolio
      </span>
      <h1 class="font-serif text-2xl md:text-3xl font-bold text-[#1a2332]">
        Nuestros Proyectos
      </h1>
    </div>

    <!-- Grid de proyectos -->
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
      <div
        *ngFor="let p of proyectos; let i = index"
        class="group flex flex-col rounded-xl overflow-hidden border border-gray-200 bg-[#f8f9fb] hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 cursor-pointer"
      >
        <!-- Imagen -->
        <div class="w-full h-28 bg-gray-200 overflow-hidden">
          <img
            [src]="p.imagen_url"
            [alt]="p.titulo"
            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
            onerror="this.src='https://images.unsplash.com/photo-1503387762-592deb58ef4e?w=300&q=80'"
          />
        </div>
        <!-- Título -->
        <div class="px-3 py-2.5">
          <p class="text-xs font-semibold text-[#1a2332] leading-snug">{{ p.titulo }}</p>
        </div>
      </div>
    </div>

  </div>
</section>
