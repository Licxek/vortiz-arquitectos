<section class="min-h-screen bg-white py-16 px-4 sm:px-8 lg:px-16">



  <!-- Encabezado -->
<div class="max-w-7xl mx-auto mb-12">
  <h2 class="text-5xl font-bold text-[#0a1f3d] mb-3">Servicios</h2>
  <p class="text-lg text-gray-500">
    Lo que hacemos por ti — tu proyecto en
    <span class="text-[#0a4d7a] font-semibold">manos expertas.</span>
  </p>
</div>

  <!-- Grid de tarjetas -->
  <div class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <button
      *ngFor="let servicio of servicios"
      (click)="abrirServicio(servicio)"
      class="text-left bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm
             hover:shadow-xl hover:-translate-y-1 hover:border-[#0a4d7a]
             active:scale-95
             transition-all duration-200 cursor-pointer group flex flex-col w-full"
    >

      <!-- Imagen con overlay oscuro -->
  <div class="relative h-44 overflow-hidden bg-[#0a1f3d]">
    <img
      [src]="servicio.imagen"
      [alt]="servicio.titulo"
      class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500"
    />
    <!-- Gradiente inferior para legibilidad -->
    <div class="absolute inset-0 bg-gradient-to-t from-[#0a1f3d]/60 to-transparent"></div>
    <!-- Indicador hover -->
    <div class="absolute bottom-3 right-4 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
      <span class="text-white/90 text-xs flex items-center gap-1 font-medium">
        Ver detalle
        <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/>
        </svg>
      </span>
    </div>
  </div>

      <!-- Título -->
      <div class="p-5 flex-1 flex items-center">
        <h3 class="text-[#0a1f3d] font-semibold text-base leading-snug group-hover:text-[#0a4d7a] transition-colors duration-200">
          {{ servicio.titulo }}
        </h3>
      </div>
    </button>
  </div>

</section>

<!-- Modal de detalle -->
<div
  *ngIf="servicioActivo()"
  class="fixed inset-0 z-50 flex items-center justify-center p-4"
  (click)="cerrarModal()"
>
  <!-- Fondo oscuro -->
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>

  <!-- Contenido del modal -->
  <div
    class="relative bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden"
    (click)="$event.stopPropagation()"
    class="relative bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden animate-modal"
  >
    <!-- Imagen del servicio -->
<div class="relative h-48 overflow-hidden">
  <img
    [src]="servicioActivo()!.imagen"
    [alt]="servicioActivo()!.titulo"
    class="w-full h-full object-cover"
  />
  <!-- Gradiente encima de la imagen para que el título se lea bien -->
  <div class="absolute inset-0 bg-gradient-to-t from-[#0a1f3d] via-[#0a1f3d]/60 to-transparent"></div>

  <!-- Botón cerrar sobre la imagen -->
  <button
    (click)="cerrarModal()"
    class="absolute top-3 right-3 text-white/70 hover:text-white bg-black/30 hover:bg-black/50 rounded-full p-1.5 transition-all duration-200"
    aria-label="Cerrar"
  >
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </button>

  <!-- Título encima de la imagen -->
  <div class="absolute bottom-0 left-0 right-0 p-5">
    <div class="w-9 h-9 bg-white/10 rounded-lg flex items-center justify-center mb-3">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21" />
      </svg>
    </div>
    <h3 class="text-white font-bold text-lg leading-snug">
      {{ servicioActivo()!.titulo }}
    </h3>
  </div>
</div>

<!-- Descripción -->
<div class="p-6">
  <p class="text-gray-600 text-sm leading-relaxed">
    {{ servicioActivo()!.descripcion }}
  </p>
  <div class="mt-6 flex justify-end">
    <button
      (click)="cerrarModal()"
      class="bg-[#0a4d7a] hover:bg-[#0a5d8f] text-white text-sm font-medium px-5 py-2.5 rounded-lg transition-colors duration-200"
    >
      Cerrar
    </button>
  </div>
</div>
