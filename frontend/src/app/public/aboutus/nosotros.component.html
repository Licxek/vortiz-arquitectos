<!-- NOSOTROS — Vortiz Arquitectos -->

<!-- ── ENCABEZADO ────────────────────────────────────────────── -->
<section
  class="bg-white px-6 pt-12 pb-6 transition-all duration-500"
  [class.opacity-0]="!headerVisible"
  [class.translate-y-4]="!headerVisible"
  [class.opacity-100]="headerVisible"
  [class.translate-y-0]="headerVisible"
>
  <div class="max-w-3xl mx-auto">
    <div class="flex items-center gap-3 mb-3">
      <!-- Ícono personas -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
        class="w-7 h-7 text-[#0a4d7a]">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
      </svg>
      <h1 class="font-serif text-2xl md:text-3xl font-bold text-[#1a2332]">Quiénes Somos</h1>
    </div>
    <p class="text-sm text-slate-500 leading-relaxed max-w-xl">
      Somos una empresa dedicada a la arquitectura, construcción y supervisión de proyectos,
      con más de 15 años de experiencia en la región.
    </p>
  </div>
</section>

<!-- ── MISIÓN Y VISIÓN ───────────────────────────────────────── -->
<section
  class="bg-white px-6 pb-10 transition-all duration-500"
  [class.opacity-0]="!mvVisible"
  [class.translate-y-4]="!mvVisible"
  [class.opacity-100]="mvVisible"
  [class.translate-y-0]="mvVisible"
>
  <div class="max-w-3xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-4">

    <!-- Misión -->
    <div class="bg-[#f2f4f7] border border-gray-200 rounded-xl p-5 hover:shadow-md transition-shadow duration-200">
      <div class="flex items-center gap-2.5 mb-3">
        <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center flex-shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8" class="w-4 h-4 text-[#0a4d7a]">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="6"/>
            <circle cx="12" cy="12" r="2"/>
          </svg>
        </div>
        <h2 class="text-sm font-bold text-[#1a2332]">Misión</h2>
      </div>
      <p class="text-xs text-slate-600 leading-relaxed">{{ mision }}</p>
    </div>

    <!-- Visión -->
    <div class="bg-[#f2f4f7] border border-gray-200 rounded-xl p-5 hover:shadow-md transition-shadow duration-200">
      <div class="flex items-center gap-2.5 mb-3">
        <div class="w-8 h-8 rounded-lg bg-violet-100 flex items-center justify-center flex-shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8" class="w-4 h-4 text-violet-600">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <h2 class="text-sm font-bold text-[#1a2332]">Visión</h2>
      </div>
      <p class="text-xs text-slate-600 leading-relaxed">{{ vision }}</p>
    </div>

  </div>
</section>

<!-- ── VALORES ────────────────────────────────────────────────── -->
<section
  class="bg-white px-6 pb-16 transition-all duration-500"
  [class.opacity-0]="!valoresVisible"
  [class.translate-y-4]="!valoresVisible"
  [class.opacity-100]="valoresVisible"
  [class.translate-y-0]="valoresVisible"
>
  <div class="max-w-3xl mx-auto">
    <h2 class="font-serif text-xl md:text-2xl font-bold text-[#1a2332] mb-5">Valores</h2>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-3.5">
      <div
        *ngFor="let v of valores; let i = index"
        class="bg-[#f2f4f7] border border-gray-200 rounded-xl py-5 px-3 flex flex-col items-center gap-3 text-center hover:border-blue-300 hover:shadow-md hover:-translate-y-0.5 transition-all duration-200"
      >
        <div class="w-12 h-12 bg-[#e8ecf2] rounded-xl flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="1.4" class="w-6 h-6 text-[#1a2332]">
            <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="v.icono"/>
          </svg>
        </div>
        <span class="text-xs font-medium text-[#1a2332] leading-snug">{{ v.nombre }}</span>
      </div>
    </div>
  </div>
</section>
