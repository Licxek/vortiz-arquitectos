<div class="min-h-screen flex flex-col bg-white">

  <!-- Header con gradiente -->
  <header class="bg-gradient-to-b from-black via-[#071020] to-[#0a1f3d] px-6 py-10">
    <div class="max-w-3xl mx-auto flex items-center justify-center gap-5">
      <img [src]="configuracion?.logo_url || '/assets/img/logo.png'" alt="Vortiz" class="h-20 w-auto" />
      <div class="text-white">
        <h1 class="text-3xl md:text-4xl font-bold">Vortiz Arquitectos</h1>
        <p class="text-sm md:text-base text-gray-400 mt-1">Diseñamos espacios, construimos confianza.</p>
      </div>
    </div>
  </header>

  <!-- Cuerpo -->
  <main class="flex-1 flex flex-col items-center px-4 py-12 md:py-16">

    <h2 class="text-3xl md:text-4xl font-bold text-gray-900 mb-3 text-center">
      Recuperar contraseña
    </h2>
    <p class="text-gray-500 text-sm md:text-base text-center mb-10 max-w-md">
      Ingresa tu correo electrónico y te enviaremos un código de verificación.
    </p>

    <form (ngSubmit)="enviarRecuperacion()"
          class="w-full max-w-md bg-white rounded-2xl shadow-[0_20px_60px_-15px_rgba(10,31,61,0.25)] border border-gray-100 p-6 md:p-8 space-y-5 ring-1 ring-gray-100">

      <div class="relative">
        <svg class="w-5 h-5 text-[#0a1f3d] absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none"
             fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        <input type="email"
               [(ngModel)]="correo"
               name="correo"
               placeholder="Dirección de correo electrónico"
               class="w-full pl-12 pr-4 py-3 bg-white border border-gray-200 rounded-xl text-sm text-gray-800 placeholder-gray-500 outline-none focus:border-[#0a1f3d] focus:ring-2 focus:ring-[#0a1f3d]/10 transition-all"
               required />
      </div>

      <!-- Mensaje de error -->
      <div *ngIf="errorMensaje"
           class="flex items-center gap-2 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
        <span>{{errorMensaje}}</span>
      </div>

      <button type="submit"
              [disabled]="cargando"
              class="w-full py-3.5 bg-[#0a4d7a] hover:bg-[#0a5d8f] text-white font-semibold text-base rounded-xl shadow-md hover:shadow-lg transition-all disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2">
        <svg *ngIf="cargando" class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"></circle>
          <path fill="currentColor" class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        {{cargando ? 'Enviando...' : 'Enviar código de verificación'}}
      </button>

      <button type="button" (click)="volver()"
              class="w-full flex items-center justify-center gap-2 text-sm text-gray-600 hover:text-[#0a1f3d] transition-colors py-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        Volver al inicio de sesión
      </button>
    </form>

  </main>

  <!-- Footer -->
  <footer class="bg-gradient-to-b from-[#0a1f3d] via-[#071020] to-black px-6 py-6 border-t border-white/5">
    <div class="max-w-3xl mx-auto flex flex-col md:flex-row items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <img [src]="configuracion?.logo_url || '/assets/img/logo.png'" alt="Vortiz" class="h-12 w-auto" />
        <span class="text-white font-semibold text-sm">Vortiz Arquitectos</span>
      </div>
      <p class="text-xs text-gray-400">
        © 2026 · Panel de Administración
      </p>
    </div>
  </footer>

</div>
