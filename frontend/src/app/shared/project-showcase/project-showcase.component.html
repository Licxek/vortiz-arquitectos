<!-- Backdrop con scroll -->
<div
  class="fixed inset-0 z-[100] bg-black/70 backdrop-blur-sm overflow-y-auto animate-[fadeIn_0.3s_ease-out]"
  (click)="cerrar.emit()"
>
  <div class="min-h-screen flex items-start justify-center p-4 md:p-8">
    <!-- Container -->
    <div
      (click)="$event.stopPropagation()"
      class="bg-white rounded-3xl max-w-6xl w-full overflow-hidden shadow-2xl animate-[scaleIn_0.3s_cubic-bezier(0.16,1,0.3,1)]"
    >
      <!-- Header -->
      <div
        class="relative bg-gradient-to-br from-gray-50 to-white p-6 md:p-8 border-b border-gray-100"
      >
        <button
          (click)="cerrar.emit()"
          class="absolute top-4 right-4 w-10 h-10 hover:bg-gray-100 rounded-xl flex items-center justify-center transition-colors z-10"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>

        <div class="flex items-center gap-4 pr-12">
          <!-- Logo o iniciales -->
          <div class="shrink-0">
            <img
              *ngIf="proyecto.logoUrl"
              [src]="proyecto.logoUrl"
              [alt]="proyecto.nombre"
              class="w-16 h-16 md:w-20 md:h-20 object-contain"
            />
            <div
              *ngIf="!proyecto.logoUrl"
              class="w-16 h-16 md:w-20 md:h-20 rounded-2xl flex items-center justify-center text-2xl md:text-3xl font-bold"
              [style.background-color]="proyecto.colorMarca + '15'"
              [style.color]="proyecto.colorMarca"
            >
              {{ proyecto.iniciales }}
            </div>
          </div>

          <div class="min-w-0 flex-1">
            <h2
              class="text-2xl md:text-3xl font-bold text-gray-900 leading-tight"
            >
              {{ proyecto.nombre }}
            </h2>
            <div class="flex flex-wrap items-center gap-2 mt-2">
              <span
                class="text-[10px] font-bold uppercase tracking-widest px-3 py-1 rounded-full"
                [style.background-color]="proyecto.colorMarca + '15'"
                [style.color]="proyecto.colorMarca"
              >
                {{ proyecto.categoria | titlecase }}
              </span>
              <span class="text-sm text-gray-400">·</span>
              <span class="text-sm text-gray-600 font-medium">{{ proyecto.anio }}</span>
              <ng-container *ngIf="proyecto.cliente">
                <span class="text-sm text-gray-400">·</span>
                <span class="text-sm text-gray-600 font-medium">{{ proyecto.cliente }}</span>
              </ng-container>
            </div>
          </div>
        </div>
      </div>

      <!-- Galería -->
      <div class="p-6 md:p-8" *ngIf="hayImagenes()">
        <!-- Vista compacta: hero + 4 miniaturas -->
        <div
          *ngIf="!mostrarTodas()"
          class="grid grid-cols-1 md:grid-cols-4 md:grid-rows-2 gap-2 md:gap-3 md:h-[420px]"
        >
          <!-- Hero -->
          <div
            class="md:col-span-2 md:row-span-2 aspect-video md:aspect-auto rounded-2xl overflow-hidden bg-gray-100 cursor-pointer group relative"
            (click)="abrirLightbox(0, $event)"
          >
            <img
              [src]="imagenes()[0]"
              [alt]="proyecto.nombre"
              class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
            />
            <div
              class="absolute inset-0 bg-black/0 group-hover:bg-black/30 transition-colors flex items-center justify-center"
            >
              <div
                class="opacity-0 group-hover:opacity-100 transition-opacity bg-white/95 rounded-full p-3 shadow-xl"
              >
                <svg
                  class="w-6 h-6 text-gray-900"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"
                  />
                </svg>
              </div>
            </div>
          </div>

          <!-- 4 thumbnails siguientes -->
          <div
            *ngFor="let img of imagenes() | slice:1:5; let i = index"
            class="aspect-video md:aspect-auto rounded-2xl overflow-hidden bg-gray-100 cursor-pointer group relative"
            (click)="i === 3 && imagenes().length > 5 ? toggleVerTodas($event) : abrirLightbox(i + 1, $event)"
          >
            <img
              [src]="img"
              [alt]="proyecto.nombre + ' imagen ' + (i + 2)"
              class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
            />

            <!-- "+N más" en la última si hay más imágenes -->
            <div
              *ngIf="i === 3 && imagenes().length > 5"
              class="absolute inset-0 bg-black/60 backdrop-blur-[2px] flex flex-col items-center justify-center text-white"
            >
              <span class="text-3xl font-bold">+{{ imagenes().length - 5 }}</span>
              <span class="text-xs uppercase tracking-widest mt-1">Ver todas</span>
            </div>
          </div>
        </div>

        <!-- Vista expandida: todas las imágenes -->
        <div
          *ngIf="mostrarTodas()"
          class="grid grid-cols-2 md:grid-cols-3 gap-2 md:gap-3"
        >
          <div
            *ngFor="let img of imagenes(); let i = index"
            (click)="abrirLightbox(i, $event)"
            class="aspect-video rounded-xl overflow-hidden bg-gray-100 cursor-pointer group"
          >
            <img
              [src]="img"
              [alt]="proyecto.nombre + ' imagen ' + (i + 1)"
              class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
            />
          </div>
        </div>
      </div>

      <!-- Empty state -->
      <div *ngIf="!hayImagenes()" class="p-12 text-center text-gray-400">
        <svg
          class="w-16 h-16 mx-auto mb-3 text-gray-200"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
          />
        </svg>
        <p class="text-sm font-medium">Galería en preparación</p>
      </div>

      <!-- Descripción + acciones -->
      <div class="px-6 md:px-8 pb-6 md:pb-8 space-y-6">
        <div *ngIf="proyecto.descripcion" class="border-t border-gray-100 pt-6">
          <h3
            class="text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-3"
          >
            Sobre este proyecto
          </h3>
          <p class="text-gray-700 leading-relaxed whitespace-pre-line">
            {{ proyecto.descripcion }}
          </p>
        </div>

        <div class="flex flex-wrap gap-3 pt-2" *ngIf="hayImagenes() || proyecto.videoUrl">
          <!-- Ver todas / volver -->
          <button
            *ngIf="hayImagenes() && imagenes().length > 5 && !mostrarTodas()"
            (click)="toggleVerTodas($event)"
            class="px-5 py-2.5 bg-gray-900 hover:bg-gray-800 text-white rounded-xl font-semibold text-sm transition-all hover:shadow-lg flex items-center gap-2"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 5h16M4 12h16M4 19h16" />
            </svg>
            Ver todas las imágenes ({{ imagenes().length }})
          </button>

          <button
            *ngIf="mostrarTodas()"
            (click)="toggleVerTodas($event)"
            class="px-5 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-900 rounded-xl font-semibold text-sm transition-all flex items-center gap-2"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
            Vista compacta
          </button>

          <!-- Video -->
          <button
            *ngIf="proyecto.videoUrl && embedUrl()"
            (click)="abrirVideo($event)"
            class="px-5 py-2.5 text-white rounded-xl font-semibold text-sm transition-all hover:shadow-lg flex items-center gap-2"
            [style.background-color]="proyecto.colorMarca"
          >
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z" />
            </svg>
            Ver video del proyecto
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal de video (overlay encima) -->
<div
  *ngIf="videoAbierto() && embedUrl()"
  class="fixed inset-0 z-[150] bg-black/95 flex items-center justify-center p-4 animate-[fadeIn_0.2s_ease-out]"
  (click)="cerrarVideo($event)"
>
  <button
    (click)="cerrarVideo($event)"
    class="absolute top-4 right-4 w-11 h-11 bg-white/10 hover:bg-white/20 rounded-full flex items-center justify-center text-white backdrop-blur-sm transition-all z-10"
  >
    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
    </svg>
  </button>
  <div class="relative w-full max-w-5xl aspect-video" (click)="$event.stopPropagation()">
    <iframe
      [src]="embedUrl()"
      class="w-full h-full rounded-xl shadow-2xl"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen
    ></iframe>
  </div>
</div>

<!-- Lightbox -->
<app-lightbox
  *ngIf="lightboxIndex() >= 0"
  [imagenes]="imagenes()"
  [indiceInicial]="lightboxIndex()"
  (cerrar)="cerrarLightbox()"
></app-lightbox>
