<div
  *ngIf="visible()"
  class="fixed inset-0 z-[300] bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 animate-[fadeIn_0.2s_ease-out]"
>
  <div
    class="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden animate-[scaleIn_0.3s_cubic-bezier(0.16,1,0.3,1)]"
  >
    <!-- Header con icono -->
    <div class="p-6 pb-4 text-center">
      <div
        class="w-16 h-16 rounded-full bg-amber-100 flex items-center justify-center mx-auto mb-4"
      >
        <svg
          class="w-8 h-8 text-amber-600"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
      </div>
      <h2 class="text-xl font-bold text-gray-900 mb-2">{{ titulo() }}</h2>
      <p class="text-sm text-gray-600 leading-relaxed">{{ mensaje() }}</p>
    </div>

    <!-- Botón -->
    <div class="px-6 pb-6">
      <button
        (click)="confirmar()"
        class="w-full py-3 bg-[#0a4d7a] hover:bg-[#0a5d8f] text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all"
      >
        Iniciar sesión de nuevo
      </button>
    </div>
  </div>
</div>
