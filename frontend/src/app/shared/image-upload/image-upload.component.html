<div class="space-y-2">
  <label *ngIf="label" class="block text-xs font-semibold uppercase tracking-wider text-gray-500">
    {{ label }}
  </label>

  <!-- SIN IMAGEN -->
  <div
    *ngIf="(!valor || imagenRota()) && !subiendo()"
    class="relative border-2 border-dashed rounded-2xl transition-all cursor-pointer overflow-hidden"
    [class.border-gray-300]="!arrastrando()"
    [class.hover:border-[#0a4d7a]]="!arrastrando()"
    [class.hover:bg-gray-50]="!arrastrando()"
    [class.border-[#0a4d7a]]="arrastrando()"
    [class.bg-blue-50]="arrastrando()"
    [class.aspect-square]="aspectRatio === 'square'"
    [class.aspect-video]="aspectRatio === 'wide'"
    [class.min-h-[200px]]="aspectRatio === 'auto'"
    (click)="abrirSelector()"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <div class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center">
      <svg
        class="w-10 h-10 text-gray-400 mb-3"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"
        />
      </svg>
      <p class="text-sm font-medium text-gray-700">
        <span class="text-[#0a4d7a]">Click para subir</span> o arrastra aquí
      </p>
      <p class="text-xs text-gray-500 mt-1">PNG, JPG, WEBP, SVG · máx 5MB</p>
    </div>
  </div>

  <!-- CON IMAGEN -->
  <div
    *ngIf="valor && !imagenRota() && !subiendo()"
    class="relative group rounded-2xl overflow-hidden border border-gray-200 bg-gray-50"
    [class.aspect-square]="aspectRatio === 'square'"
    [class.aspect-video]="aspectRatio === 'wide'"
    [class.p-4]="objectFit === 'contain'"
  >
    <img
      [src]="valor"
      alt=""
      class="w-full h-full"
      [class.object-cover]="objectFit === 'cover'"
      [class.object-contain]="objectFit === 'contain'"
      (error)="onImagenError()"
    />

    <div
      class="absolute inset-0 bg-black/0 group-hover:bg-black/50 transition-colors flex items-center justify-center gap-2 opacity-0 group-hover:opacity-100"
    >
      <button
        type="button"
        (click)="abrirSelector()"
        class="px-4 py-2 bg-white text-gray-800 rounded-lg text-sm font-semibold shadow-md hover:bg-gray-100 transition-all"
      >
        Reemplazar
      </button>
      <button
        type="button"
        (click)="eliminar()"
        class="px-4 py-2 bg-red-500 text-white rounded-lg text-sm font-semibold shadow-md hover:bg-red-600 transition-all"
      >
        Eliminar
      </button>
    </div>
  </div>

  <!-- SUBIENDO -->
  <div
    *ngIf="subiendo()"
    class="rounded-2xl border-2 border-gray-200 bg-gray-50 p-12 flex flex-col items-center justify-center gap-3"
    [class.aspect-square]="aspectRatio === 'square'"
    [class.aspect-video]="aspectRatio === 'wide'"
  >
    <svg class="animate-spin w-10 h-10 text-[#0a4d7a]" fill="none" viewBox="0 0 24 24">
      <circle
        cx="12"
        cy="12"
        r="10"
        stroke="currentColor"
        stroke-width="4"
        class="opacity-25"
      ></circle>
      <path
        fill="currentColor"
        class="opacity-75"
        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
      ></path>
    </svg>
    <p class="text-sm text-gray-600">Subiendo imagen...</p>
  </div>

  <!-- ERROR -->
  <p *ngIf="error()" class="text-xs text-red-600 flex items-center gap-1">
    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"
      />
    </svg>
    {{ error() }}
  </p>

  <!-- Input file oculto -->
  <input
    #fileInput
    type="file"
    accept="image/jpeg,image/png,image/webp,image/gif,image/svg+xml"
    (change)="onArchivoSeleccionado($event)"
    class="hidden"
  />
</div>
