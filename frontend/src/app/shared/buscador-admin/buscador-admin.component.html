<div
  *ngIf="abierto"
  class="absolute left-0 right-0 top-full mt-2 bg-white rounded-2xl shadow-2xl border border-gray-100 overflow-hidden flex flex-col text-gray-800 vortiz-buscador-entrada"
  style="max-height: 70vh; z-index: 60"
>
  <div *ngIf="cargando()" class="p-6 text-center">
    <p class="text-sm text-gray-400">Cargando...</p>
  </div>

  <div class="flex-1 overflow-y-auto p-2" *ngIf="!cargando()">
    <div *ngIf="resultados().length === 0 && query.trim()" class="p-6 text-center">
      <p class="text-sm text-gray-400">Sin resultados para "{{ query }}"</p>
      <p class="text-xs text-gray-300 mt-1">Intenta con otra palabra clave</p>
    </div>

    <ng-container
      *ngFor="let grupo of resultadosAgrupados() | keyvalue: ordenComparator; trackBy: trackByKey"
    >
      <div class="flex items-center justify-between px-3 py-1.5 mt-3 first:mt-0">
        <span
          class="text-[11px] font-bold uppercase tracking-wider text-gray-400 flex items-center gap-1.5"
        >
          <svg
            *ngIf="grupo.key === 'reciente'"
            class="w-3 h-3"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
          {{ etiquetaCategoria(grupo.key) }}
        </span>
        <button
          *ngIf="grupo.key === 'reciente'"
          type="button"
          (click)="limpiarRecientes($event)"
          class="text-[10px] text-gray-400 hover:text-red-500 transition-colors"
        >
          Limpiar
        </button>
      </div>

      <button
        *ngFor="let r of grupo.value; let i = index; trackBy: trackById"
        type="button"
        (click)="seleccionar(r, $event)"
        (mouseenter)="indiceSeleccionado.set(indiceGlobal(grupo.key, i))"
        class="w-full flex items-center gap-3 px-3 py-2 text-left rounded-lg transition-colors"
        [class.resultado-activo]="indiceSeleccionado() === indiceGlobal(grupo.key, i)"
        [class.bg-blue-50]="indiceSeleccionado() === indiceGlobal(grupo.key, i)"
        [class.vortiz-cascada-item]="mostrarCascada()"
        [style.animation-delay.ms]="mostrarCascada() ? indiceGlobal(grupo.key, i) * 25 : 0"
      >
        <div class="text-lg shrink-0">{{ r.icono }}</div>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium text-gray-900 truncate">{{ r.titulo }}</div>
          <div class="text-xs text-gray-500 truncate">{{ r.subtitulo }}</div>
        </div>
        <svg
          *ngIf="r._reciente"
          class="w-3.5 h-3.5 text-gray-300 shrink-0"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
      </button>
    </ng-container>
  </div>

  <div
    class="px-4 py-2 border-t border-gray-100 bg-gray-50 flex items-center justify-between text-[11px] text-gray-500"
  >
    <div class="flex items-center gap-3">
      <span class="flex items-center gap-1">
        <kbd class="px-1 py-0 font-mono bg-white rounded border border-gray-200">↑↓</kbd>
        Navegar
      </span>
      <span class="flex items-center gap-1">
        <kbd class="px-1 py-0 font-mono bg-white rounded border border-gray-200">↵</kbd>
        Abrir
      </span>
      <span class="flex items-center gap-1">
        <kbd class="px-1 py-0 font-mono bg-white rounded border border-gray-200">ESC</kbd>
        Cerrar
      </span>
    </div>
    <span class="font-semibold text-[#0a4d7a]">
      {{ resultados().length }} {{ resultados().length === 1 ? 'resultado' : 'resultados' }}
    </span>
  </div>
</div>
