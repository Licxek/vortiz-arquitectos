<div class="space-y-3">
  <div class="flex items-center justify-between">
    <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500">
      {{ label }}
      <span class="text-gray-400 font-normal normal-case ml-1">
        ({{ imagenesArr().length }}/{{ maximo }})
      </span>
    </label>
  </div>

  <!-- Grid de previews actuales -->
  <div
    *ngIf="imagenesArr().length > 0"
    class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2"
  >
    <div
      *ngFor="let img of imagenesArr(); let i = index; trackBy: trackByIndex"
      class="relative group rounded-xl overflow-hidden bg-gray-100 aspect-video border-2 border-transparent hover:border-[#0a4d7a]/30 transition-all"
    >
      <img [src]="img" [alt]="'Imagen ' + (i + 1)" class="w-full h-full object-cover" />

      <!-- Badge "Principal" en la primera -->
      <span
        *ngIf="i === 0"
        class="absolute top-1.5 left-1.5 bg-[#0a4d7a] text-white text-[9px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider shadow-md"
      >
        Principal
      </span>

      <!-- Número de orden -->
      <span
        *ngIf="i > 0"
        class="absolute top-1.5 left-1.5 bg-black/60 text-white text-[10px] font-semibold w-5 h-5 rounded-full flex items-center justify-center backdrop-blur-sm"
      >
        {{ i + 1 }}
      </span>

      <!-- Controles overlay -->
      <div
        class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end justify-between p-1.5"
      >
        <!-- Flechas de orden -->
        <div class="flex gap-1">
          <button
            (click)="mover(i, -1, $event)"
            [disabled]="i === 0"
            class="w-6 h-6 bg-white/90 hover:bg-white rounded-md flex items-center justify-center disabled:opacity-40 disabled:cursor-not-allowed transition-colors shadow-sm"
            [title]="i === 0 ? 'Ya es la primera' : 'Mover izquierda'"
          >
            <svg
              class="w-3 h-3 text-gray-700"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
          </button>
          <button
            (click)="mover(i, 1, $event)"
            [disabled]="i === imagenesArr().length - 1"
            class="w-6 h-6 bg-white/90 hover:bg-white rounded-md flex items-center justify-center disabled:opacity-40 disabled:cursor-not-allowed transition-colors shadow-sm"
            [title]="i === imagenesArr().length - 1 ? 'Ya es la última' : 'Mover derecha'"
          >
            <svg
              class="w-3 h-3 text-gray-700"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
              viewBox="0 0 24 24"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
            </svg>
          </button>
        </div>

        <!-- Botón eliminar -->
        <button
          (click)="eliminar(i, $event)"
          class="w-6 h-6 bg-red-500 hover:bg-red-600 text-white rounded-md flex items-center justify-center transition-colors shadow-sm"
          title="Eliminar imagen"
        >
          <svg
            class="w-3 h-3"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            viewBox="0 0 24 24"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Uploader (cuando aún no llegó al máximo) -->
  <div *ngIf="imagenesArr().length < maximo && uploaderVisible()">
    <app-image-upload
      [label]="
        imagenesArr().length === 0
          ? 'Subir primera imagen'
          : 'Agregar imagen ' + (imagenesArr().length + 1)
      "
      [valor]="''"
      (valorChange)="agregar($event)"
      [carpeta]="carpeta"
      [aspectRatio]="aspectRatio"
    ></app-image-upload>
  </div>

  <!-- Mensaje cuando se llegó al máximo -->
  <p
    *ngIf="imagenesArr().length >= maximo"
    class="text-xs text-amber-700 bg-amber-50 border border-amber-100 rounded-lg px-3 py-2 flex items-center gap-2"
  >
    <svg
      class="w-4 h-4 shrink-0"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
      />
    </svg>
    Máximo de {{ maximo }} imágenes alcanzado. Elimina alguna para agregar más.
  </p>

  <!-- Hint -->
  <p *ngIf="hint && imagenesArr().length > 0" class="text-xs text-gray-500">
    💡 {{ hint }}
  </p>
</div>
