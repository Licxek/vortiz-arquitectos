worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # Tipos MIME
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logs
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Optimizaciones
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 20M;

    # Compresión Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # SSL/TLS configuración global
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Upstream del backend
    upstream backend_api {
        server backend:3000;
        keepalive 32;
    }

    # ═══════════════════════════════════════════════════════════════
    # Redirección HTTP → HTTPS
    # ═══════════════════════════════════════════════════════════════
    server {
        listen 80;
        listen [::]:80;
        server_name vortizarquitectos.com.mx www.vortizarquitectos.com.mx;

        # Necesario para Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ═══════════════════════════════════════════════════════════════
    # Servidor HTTPS principal
    # ═══════════════════════════════════════════════════════════════
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name vortizarquitectos.com.mx www.vortizarquitectos.com.mx;

        # Certificados Let's Encrypt
        ssl_certificate /etc/letsencrypt/live/vortizarquitectos.com.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vortizarquitectos.com.mx/privkey.pem;

        # Headers de seguridad
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Frontend (Angular SPA)
        root /usr/share/nginx/html;
        index index.html;

        # API del backend
        location /api/ {
            proxy_pass http://backend_api;    # SIN barra final → mantiene /api/
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 90s;
        }

        # Uploads del backend (imágenes subidas)
        location ^~ /uploads/ {
            proxy_pass http://backend_api/uploads/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Archivos estáticos del frontend con caché agresivo
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # SPA fallback (Angular routing)
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}