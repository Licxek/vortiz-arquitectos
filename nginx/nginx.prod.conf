events {
  worker_connections 1024;
}

http {
  # === SSL config ===
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Tamaño máximo para uploads
  client_max_body_size 10M;

  # MIME types
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # === Gzip (compresión para clientes) ===
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml+rss
    image/svg+xml;

  # === Logs ===
  log_format detailed '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time';

  # === REDIRECCIÓN HTTP → HTTPS ===
  server {
    listen 80;
    # 👇 CAMBIA por tu dominio real cuando hagas deploy
    server_name vortiz.local api.vortiz.local;
    return 301 https://$host$request_uri;
  }

  # === FRONTEND: https://vortizarquitectos.com ===
  server {
    listen 443 ssl;
    http2 on;
    # 👇 CAMBIA por tu dominio real
    server_name vortiz.local;

    # 👇 En producción real, estos vienen de Let's Encrypt
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    access_log /var/log/nginx/frontend_access.log detailed;
    error_log /var/log/nginx/frontend_error.log warn;

    location / {
      # 👇 En PROD el frontend es Nginx interno en puerto 80, NO Angular dev server :4200
      proxy_pass http://frontend:80;
      proxy_http_version 1.1;

      # 🚫 NO necesitamos WebSocket en prod (sin HMR)
      # Headers básicos
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # === BACKEND: https://api.vortizarquitectos.com ===
  server {
    listen 443 ssl;
    http2 on;
    # 👇 CAMBIA por tu dominio real
    server_name api.vortiz.local;

    ssl_certificate /etc/nginx/certs/vortiz-local.crt;
    ssl_certificate_key /etc/nginx/certs/vortiz-local.key;

    access_log /var/log/nginx/api_access.log detailed;
    error_log /var/log/nginx/api_error.log warn;

    # Healthcheck rápido (sin logs)
    location /api/health {
      access_log off;
      proxy_pass http://backend:3000;
      proxy_set_header Host $host;
      proxy_read_timeout 10s;
    }

    location / {
      proxy_pass http://backend:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;

      # Timeouts razonables
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }
  }
}