events {
  worker_connections 1024;
}

http {
  # SSL config común
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Tamaño máximo para uploads (imágenes grandes)
  client_max_body_size 10M;

  # MIME types para que sirva CSS, JS correctamente
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # === REDIRECCIÓN HTTP → HTTPS ===
  server {
    listen 80;
    server_name vortiz.local api.vortiz.local;
    return 301 https://$host$request_uri;
  }

  # === FRONTEND: https://vortiz.local ===
  server {
    listen 443 ssl;
    http2 on;
    server_name vortiz.local;

    ssl_certificate /etc/nginx/certs/vortiz-local.crt;
    ssl_certificate_key /etc/nginx/certs/vortiz-local.key;

    location / {
      proxy_pass http://frontend:4200;
      proxy_http_version 1.1;

      # Soporte para WebSockets (HMR de Angular dev server)
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  # === BACKEND: https://api.vortiz.local ===
  server {
    listen 443 ssl;
    http2 on;
    server_name api.vortiz.local;

    ssl_certificate /etc/nginx/certs/vortiz-local.crt;
    ssl_certificate_key /etc/nginx/certs/vortiz-local.key;

    location / {
      proxy_pass http://backend:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }
}